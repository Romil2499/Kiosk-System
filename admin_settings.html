<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Kiosk Information</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; padding: 40px; display: flex; justify-content: center; }
        .dashboard-card { background-color: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 800px; }
        .title { font-size: 32px; color: #004792; margin-bottom: 20px; font-weight: bold; border-bottom: 3px solid #eee; padding-bottom: 15px;}
        
        .faq-group { margin-bottom: 30px; background-color: #f8f9fa; padding: 20px; border-radius: 10px; border-left: 5px solid #ffc107; }
        .faq-question { font-size: 20px; font-weight: bold; color: #333; margin-bottom: 10px; }
        
        /* Big, easy to read text boxes */
        textarea { width: 100%; height: 100px; padding: 15px; font-size: 18px; border: 2px solid #ccc; border-radius: 8px; resize: vertical; }
        textarea:focus { border-color: #004792; outline: none; }
        
        /* Massive Save Button */
        .btn-save { background-color: #004792; color: white; border: none; padding: 25px; font-size: 24px; font-weight: bold; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .btn-save:active { background-color: #003366; transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="dashboard-card">
        <div class="title">⚙️ Update Kiosk Answers</div>
        
        <form method="POST" action="/admin/settings">
            
            {% for faq in faqs %}
            <div class="faq-group">
                <div class="faq-question">{{ faq.category }}: {{ faq.question }}</div>
                <textarea name="faq_{{ faq.id }}">{{ faq.answer }}</textarea>
            </div>
            {% endfor %}
            
            <button type="submit" class="btn-save" onclick="alert('Database Updated! The Kiosk will now show the new answers.')">
                💾 SAVE ALL UPDATES
            </button>
        </form>
    </div>

</body>
</html>
